name: Manual Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer libreoffice-calc poppler-utils

      - name: Verify system dependencies
        run: |
          which soffice
          soffice --version
          which pdftoppm
          pdftoppm -v 2>&1 || true

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
